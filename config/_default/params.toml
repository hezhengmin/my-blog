# Pages placed under these sections will be shown on homepage and archive page.
mainSections = ["post"]
# Output page's full content in RSS.
rssFullContent = true
favicon        = "img/favicon.png"

# Accepted values: "default", "lastmod"
# default = see https://gohugo.io/quick-reference/glossary/#default-sort-order
# lastmod = sort by last modified date, in descending order
SortBy              = "default"

[footer]
    since      = 2020
    customText = ""

[dateFormat]
    published   = ":date_full"
    lastUpdated = ":date_full"

[sidebar]
    emoji    = "🤣"
    subtitle = "Lorem ipsum dolor sit amet, consectetur adipiscing elit."
    avatar   = "img/anime_character.png"

[article]
    headingAnchor = false
    math          = false
    readingTime   = true

    [article.license]
        enabled = true
        default = "Licensed under CC BY-NC-SA 4.0"

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [{ type = "toc" }]

[opengraph.twitter]
    site = ""
    card = "summary_large_image"

[colorScheme]
    toggle  = true
    default = "auto"

## Comments
[comments]
    enabled  = true
    provider = "disqus"

    [comments.artalk]
        serverUrl = ""
        site      = ""

    [comments.disqusjs]
        shortname  = "ming-blog"
        apiUrl     = ""
        apiKey     = ""
        admin      = ""
        adminLabel = ""

    [comments.utterances]
        repo      = ""
        issueTerm = "pathname"
        label     = ""

    [comments.beaudar]
        repo      = ""
        issueTerm = "pathname"
        label     = ""
        theme     = ""

    [comments.remark42]
        host                    = ""
        site                    = ""
        locale                  = "en"
        max_shown_comments      = 15
        show_email_subscription = true

    [comments.vssue]
        platform        = ""
        owner           = ""
        repo            = ""
        clientId        = ""
        clientSecret    = ""
        autoCreateIssue = false

    # Waline client configuration see: https://waline.js.org/en/reference/component.html
    [comments.waline]
        serverURL    = ""
        lang         = ""
        pageview     = ""
        emoji        = ["https://unpkg.com/@waline/emojis@1.0.1/weibo"]
        requiredMeta = ["name", "email", "url"]

        [comments.waline.locale]
            admin       = "Admin"
            placeholder = ""

    [comments.twikoo]
        envId  = ""
        region = ""
        path   = ""
        lang   = ""

    # See https://cactus.chat/docs/reference/web-client/#configuration for description of the various options
    [comments.cactus]
        defaultHomeserverUrl = "https://matrix.cactus.chat:8448"
        serverName           = "cactus.chat"
        siteName             = ""  # You must insert a unique identifier here matching the one you registered (See https://cactus.chat/docs/getting-started/quick-start/#register-your-site)

    [comments.giscus]
        repo             = ""
        repoID           = ""
        category         = ""
        categoryID       = ""
        mapping          = "title"
        lightTheme       = "light"
        darkTheme        = "dark_dimmed"
        reactionsEnabled = 1
        emitMetadata     = 0
        inputPosition    = "top"
        lang             = "en"
        strict           = 0
        loading          = "lazy"

    [comments.gitalk]
        owner        = ""
        admin        = ""
        repo         = ""
        clientID     = ""
        clientSecret = ""
        proxy        = ""

    [comments.cusdis]
        host = "https://cusdis.com"
        id   = ""

    # Comentario client configuration
    [comments.comentario]
        url                   = ""
        autoInit              = false
        autoNonInteractiveSso = false
        cssOverride           = ""
        lang                  = ""
        liveUpdate            = false
        maxLevel              = 0
        noFonts               = false
        theme                 = ""

    # See all the available configurations at https://github.com/CaiJimmy/hugo-theme-stack/blob/master/config/_default/params.toml
    # Copy the configurations you need from there and paste it here.
